# =========================================================
# FluxFiles Docker Compose
# 用于本地开发、联调和单机部署。
# 启动命令：
# docker compose up -d --build
# 停止命令：
# docker compose down
# =========================================================

services:
  # -------------------------------------------------------
  # API Service
  # Go + Gin 后端服务，负责鉴权、文件元数据管理、
  # OSS 上传签名、下载链接生成、限流和安全控制。
  # -------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: fluxfiles-api
    restart: unless-stopped
    env_file:
      # 从根目录 .env 载入绝大多数环境变量
      - .env
    environment:
      # 这些值在容器内部强制覆盖。
      # PostgreSQL 和 Redis 直接复用宿主机现有服务，不重复创建容器。
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: 5432
      REDIS_ADDR: host.docker.internal:6379
    extra_hosts:
      # 让容器通过 host.docker.internal 回连宿主机已有的 PostgreSQL/Redis。
      - "host.docker.internal:host-gateway"
    ports:
      # 将宿主机 API 端口映射到容器 8080
      - "${API_PORT:-8080}:8080"

  # -------------------------------------------------------
  # Web Service
  # React 前端 + Nginx，负责公共站点、后台页面和 /api 反向代理。
  # -------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # 前端打包时注入 API 根路径
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_APP_BASE_PATH: ${VITE_APP_BASE_PATH:-/fluxfiles/}
        WEB_APP_MODE: ${WEB_APP_MODE:-subpath}
    container_name: fluxfiles-web
    restart: unless-stopped
    ports:
      # 将宿主机 Web 端口映射到容器 Nginx 80 端口
      - "${WEB_PORT:-80}:80"
    depends_on:
      # 前端容器在 API 启动后再启动
      - api
