# =========================================================
# FluxFiles Development Compose
# 用途：
# 1. 提供独立于生产配置的本地开发 / 测试环境
# 2. 使用 .env.dev，不读取生产 .env
# 3. 仅启动 api / web，直接复用宿主机已有 PostgreSQL / Redis
# 启动：
# docker compose -f docker-compose.dev.yml --env-file .env.dev up -d --build
# =========================================================

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: fluxfiles-dev-api
    restart: unless-stopped
    env_file:
      - .env.dev
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      POSTGRES_HOST: host.docker.internal
      POSTGRES_PORT: 5432
      REDIS_ADDR: host.docker.internal:6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${API_PORT:-28080}:8080"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_APP_BASE_PATH: ${VITE_APP_BASE_PATH:-/}
        WEB_APP_MODE: ${WEB_APP_MODE:-root}
    container_name: fluxfiles-dev-web
    restart: unless-stopped
    env_file:
      - .env.dev
    ports:
      - "${WEB_PORT:-28081}:80"
    depends_on:
      - api

networks:
  default:
    name: fluxfiles_dev_default
